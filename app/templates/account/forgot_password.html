{% extends 'base.html' %}
{% load i18n %}
{% block title %}{% trans "Forgot Password" %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="h3 mb-3">{% trans "Forgot Password" %}</h1>
    <form method="post" class="card p-3">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">{% trans "Send new password" %}</button>
    </form>
  </div>
</div>
{% endblock %}
